name: Build

# No `push.branches`: pushes to main only ever arrive as squash merges from
# feature branches (PR-covered) or as release tag pushes (covered below).
# Listing branches here would re-fire the whole workflow once per ref
# pointing at the same SHA.
on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only. The release job re-elevates for its own step so the
# build/test job can't accidentally mutate repo contents.
permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET 10
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Test
        run: dotnet test FLARE.slnx -c Release

  # Tag-only. A PR that breaks GenerateBundle will fail this on tag and
  # bisect back to the offending merge — running it pre-tag was duplication.
  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so MinVer can walk back to the most recent v* tag
          # and derive the version. Without this MinVer would only see the
          # tip commit and stamp a 0.0.0-alpha placeholder.
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version info
        run: |
          $hash = git rev-parse --short HEAD
          echo "SOURCE_REVISION_ID=$hash" >> $env:GITHUB_ENV
          if ($env:GITHUB_REF -match '^refs/tags/v(.+)$') {
            echo "FLARE_PACKAGE_VERSION=$($Matches[1])" >> $env:GITHUB_ENV
          } else {
            echo "FLARE_PACKAGE_VERSION=$hash" >> $env:GITHUB_ENV
          }

      - name: Publish
        run: |
          dotnet msbuild FLARE.UI/FLARE.UI.csproj -restore -t:BundleAppOnlyForFrameworkDependent `
            -p:Configuration=Release `
            -p:RuntimeIdentifier=win-x64 `
            -p:RuntimeIdentifiers=win-x64 `
            -p:SelfContained=false `
            -p:DebugSymbols=false `
            -p:DebugType=None `
            -p:SourceRevisionId=$env:SOURCE_REVISION_ID

      - name: Smoke test packaged app startup
        run: |
          $publishDir = "FLARE.UI/bin/Release/net10.0-windows/win-x64/publish"
          $exe = Join-Path $publishDir "FLARE.exe"
          $proc = Start-Process -FilePath $exe `
            -ArgumentList @("--smoke-test") `
            -Wait -PassThru -WindowStyle Hidden
          if ($proc.ExitCode -ne 0) {
            throw "Packaged FLARE.exe startup smoke test failed. Expected exit code 0, got $($proc.ExitCode)."
          }

      - name: Smoke test packaged helper guard
        run: |
          $publishDir = "FLARE.UI/bin/Release/net10.0-windows/win-x64/publish"
          $exe = Join-Path $publishDir "FLARE.exe"
          $proc = Start-Process -FilePath $exe `
            -ArgumentList @("--copy-dumps-to", (Join-Path $env:TEMP "flare-smoke-outside-root")) `
            -Wait -PassThru -WindowStyle Hidden
          if ($proc.ExitCode -ne 3) {
            throw "Packaged FLARE.exe smoke test failed. Expected helper refusal exit code 3, got $($proc.ExitCode)."
          }

      - name: Package
        run: |
          $version = $env:FLARE_PACKAGE_VERSION
          $zipName = "FLARE-$version-win-x64.zip"
          $publishDir = "FLARE.UI/bin/Release/net10.0-windows/win-x64/publish"
          Copy-Item README.md "$publishDir/README.md"
          Copy-Item LICENSE "$publishDir/LICENSE"
          Compress-Archive -Path "$publishDir/FLARE.exe","$publishDir/README.md","$publishDir/LICENSE" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Generate SHA256 checksum
        # Hash both the zip and the extracted exe so users who lost the archive can
        # still verify a copy-pasted binary.
        run: |
          $zipHash = (Get-FileHash -Algorithm SHA256 $env:ZIP_NAME).Hash.ToLower()
          $exePath = "FLARE.UI/bin/Release/net10.0-windows/win-x64/publish/FLARE.exe"
          $exeHash = (Get-FileHash -Algorithm SHA256 $exePath).Hash.ToLower()
          $lines = @(
            "$zipHash  $env:ZIP_NAME",
            "$exeHash  FLARE.exe"
          )
          $lines -join "`n" | Out-File -Encoding ascii -NoNewline SHA256SUMS.txt

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: FLARE
          path: |
            ${{ env.ZIP_NAME }}
            SHA256SUMS.txt

  release:
    # Only the tag path needs write to repo contents. Gating by tag + explicit
    # job-level permission keeps the write token off every push/PR build.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify HISTORY.log top entry matches tag
        # HISTORY.log is hand-composed prose, the only thing in the release
        # pipeline that can drift from the tag. MinVer keeps the assembly
        # version in sync with the tag automatically; this step is the
        # matching guard for the user-facing release notes. v0.7.1 shipped
        # with stale v0.7.0 notes because this check did not exist yet.
        shell: bash
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          HISTORY_TOP=$(head -n1 HISTORY.log)
          EXPECTED="v${VERSION}:"
          if [[ "$HISTORY_TOP" != "$EXPECTED"* ]]; then
            echo "FAIL: tag v$VERSION but HISTORY.log top is: $HISTORY_TOP"
            exit 1
          fi
          echo "OK: tag v$VERSION matches HISTORY.log top entry."

      - name: Extract current release notes
        # HISTORY.log accumulates every release entry, newest-first. The
        # GitHub Release body should be JUST the top entry, otherwise every
        # release page would re-include all prior versions' prose. Anchors
        # on the `vX.Y.Z:` header rather than the `----` separator so the
        # separator can change without breaking extraction.
        shell: bash
        run: |
          awk '
            /^v[0-9]+\.[0-9]+\.[0-9]+:/ { count++ }
            count == 1 { print }
            count == 2 { exit }
          ' HISTORY.log > RELEASE_NOTES.md

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: FLARE

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body_path: RELEASE_NOTES.md
          files: |
            FLARE-*-win-x64.zip
            SHA256SUMS.txt
