name: Build

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main, dev]

# Default to read-only. The release job re-elevates for its own step so the
# build/test job can't accidentally mutate repo contents.
permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Set version info
        run: |
          $hash = git rev-parse --short HEAD
          echo "SOURCE_REVISION_ID=$hash" >> $env:GITHUB_ENV
          if ($env:GITHUB_REF -match '^refs/tags/v(.+)$') {
            echo "FLARE_RELEASE_VERSION=$($Matches[1])" >> $env:GITHUB_ENV
            echo "FLARE_PACKAGE_VERSION=$($Matches[1])" >> $env:GITHUB_ENV
          } else {
            echo "FLARE_RELEASE_VERSION=" >> $env:GITHUB_ENV
            echo "FLARE_PACKAGE_VERSION=$hash" >> $env:GITHUB_ENV
          }

      - name: Build
        run: |
          $versionArgs = @()
          if ($env:FLARE_RELEASE_VERSION) {
            $versionArgs += "-p:Version=$env:FLARE_RELEASE_VERSION"
            $versionArgs += "-p:FlareIsRelease=true"
          }
          dotnet build FLARE.slnx -c Release -p:SourceRevisionId=$env:SOURCE_REVISION_ID @versionArgs

      - name: Test
        run: dotnet test FLARE.slnx -c Release --no-build

      - name: Publish
        run: |
          $versionArgs = @()
          if ($env:FLARE_RELEASE_VERSION) {
            $versionArgs += "-p:Version=$env:FLARE_RELEASE_VERSION"
            $versionArgs += "-p:FlareIsRelease=true"
          }
          dotnet msbuild FLARE.UI/FLARE.UI.csproj -restore -t:BundleAppOnlyForFrameworkDependent `
            -p:Configuration=Release `
            -p:RuntimeIdentifier=win-x64 `
            -p:RuntimeIdentifiers=win-x64 `
            -p:SelfContained=false `
            -p:DebugSymbols=false `
            -p:DebugType=None `
            -p:SourceRevisionId=$env:SOURCE_REVISION_ID `
            @versionArgs

      - name: Smoke test packaged app startup
        run: |
          $publishDir = "FLARE.UI/bin/Release/net10.0-windows/win-x64/publish"
          $exe = Join-Path $publishDir "FLARE.exe"
          $proc = Start-Process -FilePath $exe `
            -ArgumentList @("--smoke-test") `
            -Wait -PassThru -WindowStyle Hidden
          if ($proc.ExitCode -ne 0) {
            throw "Packaged FLARE.exe startup smoke test failed. Expected exit code 0, got $($proc.ExitCode)."
          }

      - name: Smoke test packaged helper guard
        run: |
          $publishDir = "FLARE.UI/bin/Release/net10.0-windows/win-x64/publish"
          $exe = Join-Path $publishDir "FLARE.exe"
          $proc = Start-Process -FilePath $exe `
            -ArgumentList @("--copy-dumps-to", (Join-Path $env:TEMP "flare-smoke-outside-root")) `
            -Wait -PassThru -WindowStyle Hidden
          if ($proc.ExitCode -ne 3) {
            throw "Packaged FLARE.exe smoke test failed. Expected helper refusal exit code 3, got $($proc.ExitCode)."
          }

      - name: Package
        run: |
          $version = $env:FLARE_PACKAGE_VERSION
          $zipName = "FLARE-$version-win-x64.zip"
          $publishDir = "FLARE.UI/bin/Release/net10.0-windows/win-x64/publish"
          Copy-Item README.md "$publishDir/README.md"
          Copy-Item LICENSE "$publishDir/LICENSE"
          Compress-Archive -Path "$publishDir/FLARE.exe","$publishDir/README.md","$publishDir/LICENSE" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Generate SHA256 checksum
        # Hash both the zip and the extracted exe so users who lost the archive can
        # still verify a copy-pasted binary.
        run: |
          $zipHash = (Get-FileHash -Algorithm SHA256 $env:ZIP_NAME).Hash.ToLower()
          $exePath = "FLARE.UI/bin/Release/net10.0-windows/win-x64/publish/FLARE.exe"
          $exeHash = (Get-FileHash -Algorithm SHA256 $exePath).Hash.ToLower()
          $lines = @(
            "$zipHash  $env:ZIP_NAME",
            "$exeHash  FLARE.exe"
          )
          $lines -join "`n" | Out-File -Encoding ascii -NoNewline SHA256SUMS.txt

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: FLARE
          path: |
            ${{ env.ZIP_NAME }}
            SHA256SUMS.txt

  release:
    # Only the tag path needs write to repo contents. Gating by tag + explicit
    # job-level permission keeps the write token off every push/PR build.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: FLARE

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: HISTORY.log
          files: |
            FLARE-*-win-x64.zip
            SHA256SUMS.txt
