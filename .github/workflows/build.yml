name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set version info
        run: |
          $hash = git rev-parse --short HEAD
          echo "SOURCE_REVISION_ID=$hash" >> $env:GITHUB_ENV

      - name: Build
        run: dotnet build FLARE.slnx -c Release -p:SourceRevisionId=$env:SOURCE_REVISION_ID

      - name: Test
        run: dotnet test FLARE.slnx -c Release --no-build

      - name: Publish
        run: |
          dotnet msbuild FLARE.UI/FLARE.UI.csproj -restore -t:BundleAppOnlyForFrameworkDependent `
            -p:Configuration=Release `
            -p:RuntimeIdentifier=win-x64 `
            -p:RuntimeIdentifiers=win-x64 `
            -p:SelfContained=false `
            -p:DebugSymbols=false `
            -p:DebugType=None `
            -p:SourceRevisionId=$env:SOURCE_REVISION_ID

      - name: Package
        run: |
          $version = if ($env:GITHUB_REF -match 'refs/tags/v(.+)') { $Matches[1] } else { $env:SOURCE_REVISION_ID }
          $zipName = "FLARE-$version-win-x64.zip"
          $publishDir = "FLARE.UI/bin/Release/net10.0-windows/win-x64/publish"
          Copy-Item README.md "$publishDir/README.md"
          Copy-Item LICENSE "$publishDir/LICENSE"
          Compress-Archive -Path "$publishDir/FLARE.exe","$publishDir/README.md","$publishDir/LICENSE" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FLARE
          path: ${{ env.ZIP_NAME }}

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
